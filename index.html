<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemzeti Edvin - A nemzetiségek tárháza</title>
    <style>
        /* Legenda gomb stílusa - modern, csak szöveg jellegű */
.legend-btn {
    width: 100%;
    background: rgba(0, 62, 138, 0.1);
    border: 1px dashed var(--deep-blue);
    color: #4da3ff;
    padding: 10px;
    margin-top: 15px;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
    font-size: 0.9rem;
}

.legend-btn:hover {
    background: rgba(0, 62, 138, 0.2);
}

/* Legenda belső tartalma */
.legend-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease-in-out;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 0 0 5px 5px;
}

.legend-content p {
    padding: 15px;
    font-style: italic;
    line-height: 1.6;
    color: #ddd;
    margin: 0;
}

.legend-content.open {
    max-height: 500px; /* Elég nagy, hogy a hosszú legendák is elférjenek */
    margin-top: 5px;
}
        :root {
            --deep-blue: #003E8A;
            --bg-dark: #121212;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGÁCIÓ --- */
        nav {
            width: 100%;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 20px 40px;
            transition: 0.3s all ease;
            position: relative;
            border-bottom: 3px solid transparent;
        }

        /* Felfelé halványuló kék hatás */
        .nav-btn.active {
            background-image: linear-gradient(to top, rgba(0, 62, 138, 0.4), rgba(0, 62, 138, 0));
            border-bottom: 3px solid var(--deep-blue);
            color: #4da3ff;
        }

        /* --- OLDALAK ALAPSTÍLUSA --- */
        .page {
            display: none;
            padding-top: 100px;
            min-height: 100vh;
            animation: fadeIn 0.6s ease;
        }

        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    /* --- JAVÍTOTT KEZDŐLAP ELRENDEZÉS --- */
.home-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px; /* Kisebb távolság, hogy elférjenek */
    padding: 0 5%;
    text-align: center;
}

.side-images {
    flex: 1; /* Dinamikusan kitölti a helyet */
    max-width: 200px; /* De ne legyen szélesebb 200px-nél */
    aspect-ratio: 2 / 3; /* Fix arány: mindig 2:3 lesz, nem nyúlik el! */
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 20px rgba(0, 62, 138, 0.2);
}

.side-images img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Levágja a széleket, de nem torzít */
    position: absolute;
    left: 0;
    top: 0;
    transition: opacity 1s ease-in-out;
}

/* --- MOBIL NÉZET (Telefonokra optimalizálva) --- */
@media (max-width: 768px) {
    .home-container {
        flex-direction: column; /* Egymás alá kerülnek az elemek */
        gap: 30px;
    }

    .side-images {
        width: 150px; /* Telefonon kicsit kisebbek legyenek */
        max-width: 80% ;
        /* Itt a trükk: telefonon a logó alá/fölé kerülnek */
    }

    .main-content {
        order: -1; /* A logó és a felirat kerüljön legfelülre */
    }

    #nation {
        font-size: 2rem; /* Telefonon kisebb betű, hogy ne törjön szét */
    }
}

        #nation {
            font-size: 3rem;
            font-weight: 800;
            color: #4da3ff;
            margin: 20px 0;
        }

        /* --- LISTA ÉS KÁRTYÁK --- */
        .list-wrapper { max-width: 900px; margin: auto; padding: 20px; }

        .continent-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--deep-blue);
            border-color: var(--deep-blue);
        }

        .nation-card {
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
            border-radius: 10px;
            overflow: hidden;
        }

        .card-header {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .card-header:hover { background: rgba(255,255,255,0.05); }

        .monogram {
            font-weight: bold;
            color: #4da3ff;
            background: rgba(0, 62, 138, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .flag-img {
            width: 35px;
            height: 25px;
            object-fit: cover;
            border-radius: 3px;
        }

        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            background: rgba(0,0,0,0.2);
        }

        .card-body.open { max-height: 800px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
        }

        .info-section h4 { color: #4da3ff; margin: 0 0 5px 0; font-size: 0.9rem; text-transform: uppercase; }
        .info-section p { margin: 0 0 15px 0; font-size: 0.95rem; line-height: 1.4; opacity: 0.9; }

    </style>
</head>
<body>

    <nav>
        <button class="nav-btn active" id="btn-home" onclick="showPage('home')">Kezdőlap</button>
        <button class="nav-btn" id="btn-list" onclick="showPage('list')">Nemzetiségek listája</button>
    </nav>
    
    <div id="home" class="page active">
        <div class="home-container">
            <div class="side-images" id="left-slideshow">
                 <img src="nationalities/native.png" style="opacity: 1;">
                 <img src="nationalities/russian.png" style="opacity: 1;">
            </div>

            <div class="main-content">
                <img src="ne_logo2.png" alt="Nemzeti Edvin" width="180"/>
                <h1>Edvin mai nemzetisége:</h1>
                <div id="nation">Betöltés...</div>
            </div>

            <div class="side-images" id="right-slideshow">
                 <img src="nationalities/canadian.png" style="opacity: 1;">
                 <img src="nationalities/chinese.png" style="opacity: 1;">
                 <img src="nationalities/gypsy.png" style="opacity: 1;">
            </div>
        </div>
    </div>

    <div id="list" class="page">
        <div class="list-wrapper">
            <div class="continent-tabs">
                <button class="tab-btn active" onclick="filterList('Európa', this)">Európa</button>
                <button class="tab-btn" onclick="filterList('Ázsia', this)">Ázsia</button>
                <button class="tab-btn" onclick="filterList('Amerika', this)">Amerika</button>
                <button class="tab-btn" onclick="filterList('Afrika', this)">Afrika</button>
                <button class="tab-btn" onclick="filterList('Óceánia', this)">Óceánia</button>
            </div>
            <div id="nation-list-container"></div>
        </div>
    </div>

<script>
    // --- ADATBÁZIS ---
   const nationData = [
    {
        name: "Magyar",
        continent: "Európa",
        monogram: "HU",
        flagPath: "images/flags/hu.png",
        traits: "Karakán, vendégszerető, büszke.",
        origin: "Uráli eredet, Kárpát-medencei letelepedés.",
        features: "Változatos, gyakran barna haj, világos szem.",
        trivia: "A bűvös kocka és a golyóstoll is magyar találmány.",
        legend: "A monda szerint Hunor és Magor egy csodálatos szarvast űzve jutottak el a Meótisz ingoványaiba, ahol letelepedtek és megalapították a hun és magyar népet." // ÚJ MEZŐ
    },
       {
            name: "Japán",
            continent: "Ázsia",
            monogram: "JP",
            flagPath: "images/flags/jp.png",
            traits: "Fegyelmezett, tisztelettudó, precíz.",
            origin: "Szigetországi homogén kultúra.",
            features: "Sötét, egyenes haj, mandulavágású szem.",
            trivia: "Náluk van a legtöbb 100 év feletti ember.",
           legend: "";
        }
        // Ide jöhet a többi...
    ];

    // --- OLDALVÁLTÁS ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(pageId).classList.add('active');
        document.getElementById('btn-' + pageId).classList.add('active');
    }

    // --- MAI NEMZETISÉG ---
    const today = new Date();
    const dayNumber = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
    const dailyIndex = dayNumber % nationData.length;
    document.getElementById("nation").textContent = nationData[dailyIndex].name;

    // --- LISTA GENERÁLÁS ---
    function filterList(continent, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const container = document.getElementById("nation-list-container");
        container.innerHTML = "";

        const filtered = nationData.filter(n => n.continent === continent);

    filtered.forEach(n => {
    const card = document.createElement("div");
    card.className = "nation-card";
    card.innerHTML = `
        <button class="card-header" onclick="toggleCard(this)">
            <span class="monogram">${n.monogram}</span>
            <img src="${n.flagPath}" alt="zászló" class="flag-img" onerror="this.style.display='none'">
            <span>${n.name}</span>
        </button>
        <div class="card-body">
            <div class="info-grid">
                <div class="info-section">
                    <h4>Külső vonások</h4> <p>${n.features}</p>
                    <h4>Származás</h4> <p>${n.origin}</p>
                </div>
                <div class="info-section">
                    <h4>Tulajdonságok</h4> <p>${n.traits}</p>
                    <h4>Érdekességek</h4> <p>${n.trivia}</p>
                </div>
            </div>
            
            <div class="legend-container">
                <button class="legend-btn" onclick="toggleLegend(this)">
                    ✨ Eredettörténet / Legenda megnyitása
                </button>
                <div class="legend-content">
                    <p>${n.legend}</p>
                </div>
            </div>
        </div>
    `;
    container.appendChild(card);
});
    }

    // --- KÁRTYA NYITÁS ---
    function toggleCard(btn) {
        const body = btn.nextElementSibling;
        const isOpen = body.classList.contains('open');
        document.querySelectorAll('.card-body').forEach(b => b.classList.remove('open'));
        if (!isOpen) body.classList.add('open');
    }

    function toggleLegend(btn) {
    const content = btn.nextElementSibling;
    content.classList.toggle('open');
    
    // Szöveg módosítása állapottól függően
    if (content.classList.contains('open')) {
        btn.textContent = "✨ Legenda bezárása";
    } else {
        btn.textContent = "✨ Eredettörténet / Legenda megnyitása";
    }
}

    // --- SLIDESHOW ---
    function setupSlideshow(containerId) {
        const container = document.getElementById(containerId);
        const imgs = container.getElementsByTagName('img');
        let current = 0;
        if(imgs.length < 2) return;

        setInterval(() => {
            imgs[current].style.opacity = 0;
            current = (current + 1) % imgs.length;
            imgs[current].style.opacity = 1;
        }, 4000);
    }

    // Indítás
    window.onload = () => {
        setupSlideshow('left-slideshow');
        setupSlideshow('right-slideshow');
        filterList('Európa', document.querySelector('.tab-btn'));
    };
</script>
</body>
</html>
