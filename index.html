<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemzeti Edvin - A nemzetiségek tárháza</title>
    <style>
        :root {
            --deep-blue: #003E8A;
            --bg-dark: #121212;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGÁCIÓ --- */
        nav {
            width: 100%;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .nav-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 20px 40px;
            transition: 0.3s all ease;
            position: relative;
        }

        /* Aktív menüpont hatás: átlátszó kék háttér és aláhúzás */
        .nav-btn.active {
            background-color: rgba(0, 62, 138, 0.2); /* Átlátszó kék */
            border-bottom: 3px solid var(--deep-blue);
            color: #4da3ff;
        }

        /* --- OLDALAK --- */
        .page {
            display: none;
            padding-top: 100px;
            min-height: 100vh;
            animation: fadeIn 0.6s ease;
        }

        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; filter: blur(5px); }
            to { opacity: 1; filter: blur(0); }
        }

        /* --- KEZDŐLAP KÉPEKKEL --- */
        .home-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 5%;
        }

        .side-images {
            width: 200px;
            height: 300px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 62, 138, 0.3);
            position: relative;
        }

        .side-images img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            transition: opacity 1s ease-in-out;
        }

        .main-content { text-align: center; max-width: 500px; }

        #nation {
            font-size: 3rem;
            font-weight: 800;
            color: #4da3ff;
            text-shadow: 0 0 15px rgba(0, 62, 138, 0.5);
            margin: 20px 0;
        }

        /* --- LISTA ÉS HARMONIKA --- */
        .list-wrapper { max-width: 900px; margin: auto; padding: 20px; }

        .continent-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--deep-blue);
            border-color: var(--deep-blue);
        }

        .nation-card {
            background: rgba(255,255,255,0.03);
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }

        .nation-card:hover { border-left-color: var(--deep-blue); background: rgba(255,255,255,0.06); }

        .card-header {
            width: 100%;
            padding: 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            font-size: 1.2rem;
        }

        .flag { font-size: 1.5rem; margin-right: 15px; }

        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0 20px;
        }

        .card-body.open { max-height: 1000px; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            font-size: 0.95rem;
        }

        .info-section h4 { color: #4da3ff; margin-bottom: 5px; }
    </style>
</head>
<body>

    <nav>
        <button class="nav-btn active" id="btn-home" onclick="showPage('home')">Kezdőlap</button>
        <button class="nav-btn" id="btn-list" onclick="showPage('list')">Nemzetiségek listája</button>
    </nav>

    <div id="home" class="page active">
        <div class="home-container">
            <div class="side-images" id="left-slideshow">
                <img src="https://via.placeholder.com/200x300/003E8A/fff?text=Kultúra+1" style="opacity: 1;">
                <img src="https://via.placeholder.com/200x300/222/fff?text=Kultúra+2" style="opacity: 0;">
            </div>

            <div class="main-content">
                <img src="ne_logo2.png" alt="Nemzeti Edvin" width="180"/>
                <h1>Edvin mai nemzetisége:</h1>
                <div id="nation">Betöltés...</div>
            </div>

            <div class="side-images" id="right-slideshow">
                <img src="https://via.placeholder.com/200x300/333/fff?text=Kultúra+3" style="opacity: 1;">
                <img src="https://via.placeholder.com/200x300/003E8A/fff?text=Kultúra+4" style="opacity: 0;">
            </div>
        </div>
    </div>

    <div id="list" class="page">
        <div class="list-wrapper">
            <div class="continent-tabs" id="tab-container">
                <button class="tab-btn active" onclick="filterList('Európa', this)">Európa</button>
                <button class="tab-btn" onclick="filterList('Ázsia', this)">Ázsia</button>
                <button class="tab-btn" onclick="filterList('Amerika', this)">Amerika</button>
                <button class="tab-btn" onclick="filterList('Afrika', this)">Afrika</button>
                <button class="tab-btn" onclick="filterList('Óceánia', this)">Óceánia</button>
            </div>
            <div id="nation-list-container"></div>
        </div>
    </div>

<script>
    // --- ADATBÁZIS OBJEKTUMOKKAL ---
    const nationData = [
        {
            name: "Magyar",
            continent: "Európa",
            flag: "🇭🇺",
            traits: "Karakán, vendégszerető, büszke.",
            origin: "Uráli eredet, Kárpát-medencei letelepedés.",
            features: "Változatos, gyakran barna haj, világos szem.",
            trivia: "A bűvös kocka és a golyóstoll is magyar találmány."
        },
        {
            name: "Japán",
            continent: "Ázsia",
            flag: "🇯🇵",
            traits: "Fegyelmezett, tisztelettudó, precíz.",
            origin: "Szigetországi elszigeteltségben kialakult homogén kultúra.",
            features: "Sötét, egyenes haj, mandulavágású szem.",
            trivia: "Náluk van a legtöbb 100 év feletti ember a világon."
        },
        // Itt bővítheted a többi nemzetiséggel...
    ];

    // --- OLDALKEZELÉS ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(pageId).classList.add('active');
        document.getElementById('btn-' + pageId).classList.add('active');
    }

    // --- NAPI NEMZETISÉG ---
    const today = new Date();
    const dayNumber = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
    const dailyIndex = dayNumber % nationData.length;
    const dailyNation = nationData[dailyIndex];
    document.getElementById("nation").textContent = `${dailyNation.flag} ${dailyNation.name}`;

    // --- LISTA GENERÁLÁS ---
    function filterList(continent, btn) {
        // Gombok stílusa
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const container = document.getElementById("nation-list-container");
        container.innerHTML = "";

        const filtered = nationData.filter(n => n.continent === continent);

        filtered.forEach(n => {
            const card = document.createElement("div");
            card.className = "nation-card";
            card.innerHTML = `
                <button class="card-header" onclick="toggleCard(this)">
                    <span class="flag">${n.flag}</span> ${n.name}
                </button>
                <div class="card-body">
                    <div class="info-grid">
                        <div class="info-section">
                            <h4>Külső vonások</h4> <p>${n.features}</p>
                            <h4>Származás</h4> <p>${n.origin}</p>
                        </div>
                        <div class="info-section">
                            <h4>Tulajdonságok</h4> <p>${n.traits}</p>
                            <h4>Érdekességek</h4> <p>${n.trivia}</p>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleCard(btn) {
        const body = btn.nextElementSibling;
        const isOpen = body.classList.contains('open');
        document.querySelectorAll('.card-body').forEach(b => b.classList.remove('open'));
        if (!isOpen) body.classList.add('open');
    }

    // --- KÉPVÁLTOGATÓ (Slideshow) ---
    function setupSlideshow(containerId) {
        const container = document.getElementById(containerId);
        const imgs = container.getElementsByTagName('img');
        let current = 0;

        setInterval(() => {
            imgs[current].style.opacity = 0;
            current = (current + 1) % imgs.length;
            imgs[current].style.opacity = 1;
        }, 4000); // 4 másodpercenként vált
    }

    // Indítás
    setupSlideshow('left-slideshow');
    setupSlideshow('right-slideshow');
    filterList('Európa', document.querySelector('.tab-btn')); // Alapértelmezett lista

</script>
</body>
</html>
