<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nemzeti Edvin - A nemzetiségek tárháza</title>
    <style>
        :root {
            --deep-blue: #003E8A;
            --bg-dark: #121212;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGÁCIÓ --- */
        nav {
            width: 100%;
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .nav-btn {
        background: none;
        border: none;
        color: white;
        font-size: 1.1rem;
        cursor: pointer;
        padding: 20px 40px;
        transition: 0.3s all ease;
        position: relative;
        border-bottom: 3px solid transparent; /* Alapértelmezett láthatatlan vonal */
    }

    /* Kifinomult, felfelé halványuló kék hatás */
    .nav-btn.active {
        background-image: linear-gradient(to top, rgba(0, 62, 138, 0.4), rgba(0, 62, 138, 0));
        border-bottom: 3px solid var(--deep-blue);
        color: #4da3ff;
    }

    /* Zászló és Monogram elrendezése a kártyán */
    .card-header {
        width: 100%;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 15px; /* Távolság az elemek között */
        background: none;
        border: none;
        color: white;
        font-size: 1.2rem;
        cursor: pointer;
    }

    .monogram {
        font-weight: bold;
        color: var(--deep-blue);
        background: rgba(255,255,255,0.1);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 0.9rem;
    }

    .flag-img {
        width: 30px;
        height: auto;
        border-radius: 3px;
        box-shadow: 0 0 5px rgba(0,0,0,0.5);
    }
</style>
</head>
<body>

    <nav>
        <button class="nav-btn active" id="btn-home" onclick="showPage('home')">Kezdőlap</button>
        <button class="nav-btn" id="btn-list" onclick="showPage('list')">Nemzetiségek listája</button>
    </nav>

    <div id="home" class="page active">
        <div class="home-container">
            <div class="side-images" id="left-slideshow">
                <img src="https://via.placeholder.com/200x300/003E8A/fff?text=Kultúra+1" style="opacity: 1;">
                <img src="https://via.placeholder.com/200x300/222/fff?text=Kultúra+2" style="opacity: 0;">
            </div>

            <div class="main-content">
                <img src="ne_logo2.png" alt="Nemzeti Edvin" width="180"/>
                <h1>Edvin mai nemzetisége:</h1>
                <div id="nation">Betöltés...</div>
            </div>

            <div class="side-images" id="right-slideshow">
                <img src="https://via.placeholder.com/200x300/333/fff?text=Kultúra+3" style="opacity: 1;">
                <img src="https://via.placeholder.com/200x300/003E8A/fff?text=Kultúra+4" style="opacity: 0;">
            </div>
        </div>
    </div>

    <div id="list" class="page">
        <div class="list-wrapper">
            <div class="continent-tabs" id="tab-container">
                <button class="tab-btn active" onclick="filterList('Európa', this)">Európa</button>
                <button class="tab-btn" onclick="filterList('Ázsia', this)">Ázsia</button>
                <button class="tab-btn" onclick="filterList('Amerika', this)">Amerika</button>
                <button class="tab-btn" onclick="filterList('Afrika', this)">Afrika</button>
                <button class="tab-btn" onclick="filterList('Óceánia', this)">Óceánia</button>
            </div>
            <div id="nation-list-container"></div>
        </div>
    </div>

<script>
    // Az adatbázis kiegészítve monogrammal és zászló elérési úttal
    const nationData = [
        {
            name: "Magyar",
            continent: "Európa",
            monogram: "HU",
            flagPath: "flags/hu.png", // A mappa és a fájlnév
            traits: "Karakán, vendégszerető, büszke.",
            origin: "Uráli eredet, Kárpát-medencei letelepedés.",
            features: "Változatos, gyakran barna haj, világos szem.",
            trivia: "A bűvös kocka és a golyóstoll is magyar találmány."
        }
        // ... többi nemzetiség
    ];

</script>
</body>
</html>
